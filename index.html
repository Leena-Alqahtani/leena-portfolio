<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leena Alqahtani | Portfolio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#071117;
      --panel:rgba(255,255,255,.05);
      --border:rgba(255,255,255,.10);
      --text:#eaf6ff;
      --muted:#b7c4cf;
      --accent:#36e6ff;
      --shadow:0 0 14px rgba(54,230,255,.20),0 0 30px rgba(54,230,255,.08);
      --card-shadow:0 10px 26px rgba(0,0,0,.22);
      --panel-glow:0 0 20px rgba(54,230,255,0.14), 0 0 38px rgba(54,230,255,0.06);
      --max:1180px;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}

    body{
      margin:0;
      font-family:'Inter',sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 50% 10%, rgba(54,230,255,.08), transparent 24%),
        linear-gradient(180deg,#0a141b 0%, #071117 100%);
      min-height:100vh;
      overflow-x:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background-image:radial-gradient(rgba(255,255,255,.05) .8px, transparent .8px);
      background-size:30px 30px;
      opacity:.16;
      pointer-events:none;
      z-index:-1;
    }

    body.rtl{
      font-family:'Tajawal',sans-serif;
      direction:rtl;
    }

    .container{
      width:min(var(--max), calc(100% - 32px));
      margin:0 auto;
    }

    .navbar{
      position:sticky;
      top:0;
      z-index:50;
      background:rgba(7,17,23,.80);
      backdrop-filter:blur(16px);
      border-bottom:1px solid rgba(255,255,255,.06);
    }

    .nav-inner{
      min-height:76px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
    }

    .nav-links{
      display:flex;
      gap:26px;
      align-items:center;
      flex-wrap:wrap;
    }

    .nav-links a{
      color:var(--muted);
      text-decoration:none;
      transition:.25s ease;
      font-size:1rem;
    }

    .nav-links a:hover{
      color:var(--accent);
      text-shadow:0 0 10px rgba(54,230,255,.35);
    }

    .lang-btn{
      border:1px solid rgba(54,230,255,.5);
      background:rgba(54,230,255,.08);
      color:var(--text);
      border-radius:999px;
      padding:10px 16px;
      cursor:pointer;
      box-shadow:var(--shadow);
      font-size:.95rem;
    }

    .hero{
      padding:58px 0 30px;
    }

    .hero-card{
      position:relative;
      overflow:hidden;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:28px;
      align-items:center;
      padding:42px;
      border-radius:36px;
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
      border:1px solid var(--border);
      box-shadow:var(--card-shadow);
    }

    .hero-visual{
      display:grid;
      place-items:center;
      position:relative;
      min-height:320px;
    }

    .hero-copy h1{
      margin:0 0 10px;
      font-size:clamp(2.3rem,5vw,4.2rem);
      font-weight:800;
    }

    section{padding:28px 0;}
    .section-title{margin:0 0 18px; font-size:1.9rem;}
    .section-sub{margin:-6px 0 22px; color:#97aab8; font-size:.96rem;}

    .projects-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:22px;
    }

    .project-card{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:26px;
      overflow:hidden;
    }

    .project-thumb img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .project-body{padding:18px;}
    .project-desc{color:var(--muted); line-height:1.9;}
    .tool-icons img{width:34px; margin-right:8px;}

    .project-link{
      color:var(--accent);
      text-decoration:none;
    }
  </style>
</head>

<body>

<section id="projects">
  <div class="container">
    <h2 class="section-title">Projects</h2>

    <div class="projects-grid">

      <!-- ✅ المشروع الجديد -->
      <article class="project-card">
        <a class="project-thumb" href="https://github.com/Leena-Alqahtani/fraud-credit-risk-dashboard" target="_blank">
          <img src="images/overview.png">
        </a>

        <div style="display:flex; gap:8px; padding:10px 18px;">
          <img src="images/geographic.png" style="width:50%; border-radius:10px;">
          <img src="images/insights.png" style="width:50%; border-radius:10px;">
        </div>

        <div class="project-body">
          <h3>Fraud & Credit Risk Analysis</h3>

          <p class="project-desc">
            • <strong>Fraud peaks at 16:00 (~17K)</strong><br><br>
            • <strong>High-risk = 20%</strong><br><br>
            • <strong>CA & TX highest fraud</strong><br><br>
            • <strong>Swipe > Online</strong>
          </p>

          <div class="tool-icons">
            <img src="images/excel.png">
            <img src="images/powerbi.png">
          </div>

          <a class="project-link" href="https://github.com/Leena-Alqahtani/fraud-credit-risk-dashboard" target="_blank">
            View Project
          </a>
        </div>
      </article>

    </div>
  </div>
</section>

</body>
</html>
